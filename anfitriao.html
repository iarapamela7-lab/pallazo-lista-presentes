<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acompanhar lista · Pallazo Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">PALLAZO <span>STUDIO</span></div>
</nav>

<div class="wrap" style="max-width:720px;">
  <div id="conteudo"><div class="loading">Carregando lista…</div></div>
</div>

<script>
async function carregar(){
  const params = new URLSearchParams(location.search);
  const slug = params.get('e');
  const cont = document.getElementById('conteudo');

  if(!slug){ cont.innerHTML = '<div class="empty">Link inválido.</div>'; return; }

  const { data, error } = await supabaseClient.rpc('get_lista_anfitriao', { p_slug: slug });

  if(error || !data || !data.length){
    cont.innerHTML = '<div class="empty">Não encontramos essa lista. Confira o link com quem te enviou.</div>';
    return;
  }

  const nomeEvento = data[0].nome_evento;
  const total = data.length;
  const escolhidos = data.filter(p => p.status !== 'disponivel').length;
  const livres = total - escolhidos;

  let html = `
    <div style="margin-bottom:8px;">
      <div style="font-size:11.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--sub);">Acompanhamento privado</div>
      <h1 style="font-size:28px; margin-top:6px;">${nomeEvento}</h1>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="num">${total}</div><div class="lbl">presentes na lista</div></div>
      <div class="stat"><div class="num">${escolhidos}</div><div class="lbl">já escolhidos</div></div>
      <div class="stat"><div class="num">${livres}</div><div class="lbl">ainda disponíveis</div></div>
    </div>
    <div class="section-title">Quem escolheu o quê</div>
  `;

  for(const p of data){
    const statusLabel = { disponivel:'Livre', reservado:'Reservado', pago:'Recebido' }[p.status];
    const quem = p.status === 'disponivel'
      ? 'Ainda disponível'
      : (p.tipo === 'pix'
          ? 'Contribuição via Pix'
          : `${p.nome_convidado || '—'}${p.whatsapp ? ' · ' + p.whatsapp : ''}`);

    html += `
      <div class="gift-row">
        <div class="gift-thumb" style="background-image:url('${p.foto_url||''}')"></div>
        <div class="gift-info">
          <div class="name">${p.presente_nome}</div>
          <div class="who">${quem}</div>
        </div>
        <div class="status-pill status-${p.status}">${statusLabel}</div>
      </div>
    `;
  }

  cont.innerHTML = html;
}

carregar();
</script>
</body>
</html>
